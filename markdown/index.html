<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Free Markdown Preview — Live Markdown Editor & Renderer</title>
  <meta name="description" content="Free online Markdown preview and editor. Write Markdown on the left, see rendered HTML on the right. Live preview, export to HTML. No signup, runs in your browser.">
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/marked@15.0.0/marked.min.js"></script>
  <style>
    textarea { font-family: 'Consolas', 'Monaco', 'Courier New', monospace; font-size: 14px; line-height: 1.6; }
    #preview { font-size: 15px; line-height: 1.7; }
    #preview h1 { font-size: 1.75rem; font-weight: 700; margin: 1.5rem 0 0.75rem; border-bottom: 1px solid #e5e7eb; padding-bottom: 0.5rem; }
    #preview h2 { font-size: 1.35rem; font-weight: 600; margin: 1.25rem 0 0.5rem; border-bottom: 1px solid #f3f4f6; padding-bottom: 0.25rem; }
    #preview h3 { font-size: 1.15rem; font-weight: 600; margin: 1rem 0 0.5rem; }
    #preview p { margin: 0.75rem 0; }
    #preview ul, #preview ol { margin: 0.5rem 0; padding-left: 1.5rem; }
    #preview ul { list-style: disc; }
    #preview ol { list-style: decimal; }
    #preview li { margin: 0.25rem 0; }
    #preview code { background: #f3f4f6; padding: 0.15rem 0.35rem; border-radius: 3px; font-size: 0.9em; font-family: 'Consolas', monospace; }
    #preview pre { background: #1f2937; color: #e5e7eb; padding: 1rem; border-radius: 6px; overflow-x: auto; margin: 0.75rem 0; }
    #preview pre code { background: none; padding: 0; color: inherit; }
    #preview blockquote { border-left: 3px solid #d1d5db; padding-left: 1rem; color: #6b7280; margin: 0.75rem 0; }
    #preview a { color: #2563eb; text-decoration: underline; }
    #preview table { border-collapse: collapse; width: 100%; margin: 0.75rem 0; }
    #preview th, #preview td { border: 1px solid #d1d5db; padding: 0.5rem 0.75rem; text-align: left; }
    #preview th { background: #f9fafb; font-weight: 600; }
    #preview img { max-width: 100%; border-radius: 4px; }
    #preview hr { border: none; border-top: 1px solid #e5e7eb; margin: 1.5rem 0; }
    .pane { height: calc(100vh - 140px - 32px); }
  </style>
</head>
<body class="bg-gray-50">
  <nav class="bg-white border-b">
    <div class="max-w-full mx-auto px-4 py-3 flex items-center justify-between">
      <div class="flex items-center gap-4">
        <a href="/free-tools/" class="text-lg font-bold text-gray-900">FreeTools</a>
        <span class="text-gray-400">/</span>
        <span class="text-gray-700">Markdown Preview</span>
      </div>
      <div class="flex gap-2">
        <button onclick="copyHtml()" class="bg-gray-100 text-gray-700 px-3 py-1.5 rounded text-sm font-medium hover:bg-gray-200">Copy HTML</button>
        <button onclick="loadSample()" class="bg-gray-100 text-gray-700 px-3 py-1.5 rounded text-sm font-medium hover:bg-gray-200">Sample</button>
        <button onclick="clearAll()" class="bg-gray-100 text-gray-700 px-3 py-1.5 rounded text-sm font-medium hover:bg-gray-200">Clear</button>
      </div>
    </div>
  </nav>

  <div class="grid grid-cols-2 divide-x" style="height: calc(100vh - 57px - 32px);">
    <div class="flex flex-col">
      <div class="px-4 py-2 bg-gray-100 text-xs font-medium text-gray-500 border-b flex justify-between">
        <span>Markdown</span>
        <span id="char-count">0 chars</span>
      </div>
      <textarea id="editor" class="pane w-full p-4 resize-none outline-none border-none bg-white" placeholder="Type your Markdown here..." oninput="render()"></textarea>
    </div>
    <div class="flex flex-col">
      <div class="px-4 py-2 bg-gray-100 text-xs font-medium text-gray-500 border-b">Preview</div>
      <div id="preview" class="pane w-full p-6 overflow-auto bg-white"></div>
    </div>
  </div>

  <footer class="h-8 flex items-center justify-center gap-4 text-xs text-gray-400 border-t bg-gray-50">
    <span>Made with care by <a href="https://docat.gumroad.com/" class="text-blue-500 hover:underline">Docat</a>. Check out our <a href="https://docat.gumroad.com/l/claudemd-mega-collection" class="text-blue-500 hover:underline">CLAUDE.md Mega Collection</a> & <a href="https://docat.gumroad.com/l/ai-solopreneur-toolkit" class="text-blue-500 hover:underline">AI Solopreneur Toolkit</a></span>
    <span class="text-gray-300">|</span>
    <a href="https://buymeacoffee.com/docat0209" target="_blank" rel="noopener noreferrer" class="hover:text-yellow-600 transition">&#9749; Buy me a coffee</a>
  </footer>

  <script>
    const editor = document.getElementById('editor');
    const preview = document.getElementById('preview');

    marked.setOptions({ breaks: true, gfm: true });

    function render() {
      const md = editor.value;
      preview.innerHTML = marked.parse(md);
      document.getElementById('char-count').textContent = md.length + ' chars';
    }

    function copyHtml() {
      navigator.clipboard.writeText(preview.innerHTML).then(() => {
        const btns = document.querySelectorAll('button');
        btns[0].textContent = 'Copied!';
        setTimeout(() => btns[0].textContent = 'Copy HTML', 1500);
      });
    }

    function clearAll() {
      editor.value = '';
      preview.innerHTML = '';
      document.getElementById('char-count').textContent = '0 chars';
    }

    function loadSample() {
      editor.value = `# Hello World

This is a **Markdown** preview tool. Everything runs in your browser.

## Features

- Live preview as you type
- GitHub Flavored Markdown (GFM)
- Tables, code blocks, blockquotes
- Copy rendered HTML

## Code Example

\`\`\`javascript
function greet(name) {
  return \`Hello, \${name}!\`;
}
\`\`\`

## Table

| Feature | Status |
|---------|--------|
| Headers | Done |
| Lists | Done |
| Code | Done |
| Tables | Done |

> "The best way to predict the future is to invent it." — Alan Kay

---

Made with [FreeTools](https://docat0209.github.io/free-tools/)
`;
      render();
    }

    // Sync scroll (approximate)
    editor.addEventListener('scroll', () => {
      const pct = editor.scrollTop / (editor.scrollHeight - editor.clientHeight);
      preview.scrollTop = pct * (preview.scrollHeight - preview.clientHeight);
    });

    // Tab key support
    editor.addEventListener('keydown', (e) => {
      if (e.key === 'Tab') {
        e.preventDefault();
        const start = editor.selectionStart;
        editor.value = editor.value.substring(0, start) + '  ' + editor.value.substring(editor.selectionEnd);
        editor.selectionStart = editor.selectionEnd = start + 2;
        render();
      }
    });
  </script>
</body>
</html>
